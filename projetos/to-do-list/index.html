<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Lista de Tarefas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>Minha Lista de Tarefas</header>
  <main>
    <p id="funcionamento">Clique duas vezes em um item para marcá-lo como completo</p>
    <div id="AdcTask">
      <input type="text" id="texto-tarefa">
      <button id="criar-tarefa">Adicionar</button>
    </div>
    <ol id="lista-tarefas"></ol>
  
    <!-- REFERENCIA: https://www.w3schools.com/charsets/ref_emoji.asp -->
    <ul>
      <li>
        <button id="mover-cima" class="circle">&#11014</button>
      </li>
      <li>
        <button id="mover-baixo" class="circle">&#11015</button>
      </li>
      <li>
        <button id="apaga-tudo" class="circle">X</button>
      </li>
      <li>
        <button id="remover-finalizados">Remover Finalizados</button>
      </li>
      <li>
        <button id="remover-selecionado">Remover Selecionados</button>
      </li>
      <li>
        <button id="salvar-tarefas">Salvar Tarefas</button>
      </li>
    </ul>

  </main>
  <script src="script.js"></script>
</body>
</html>
